name: ibiti_guardian
description: "IBITI Guardian - Secure Web3 Wallet & AI Shield"
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.3.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  privy_flutter: 0.10.1          # Auth (Google/Apple) + embedded Ethereum wallet (Android/iOS only)
  flutter_secure_storage: ^9.2.4 # Vault metadata: walletId, address, policyId, flags
  local_auth: ^3.0.1             # Biometrics / PIN for app unlock
  web3dart: ^3.0.2               # RPC calls: getBalance, eth_call, eth_sendRawTransaction
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  share_plus: ^10.1.4
  cupertino_icons: ^1.0.6
  http: ^1.2.2
  url_launcher: ^6.3.2
  path: ^1.9.0
  package_info_plus: ^8.1.0
  in_app_purchase: ^3.2.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  audioplayers: ^6.1.0
  record: ^5.1.2
  path_provider: ^2.1.4
  vibration: ^2.0.1
  workmanager: ^0.9.0
  connectivity_plus: ^7.0.0
  sqflite: ^2.3.0
  permission_handler: ^11.3.1
  flutter_animate: ^4.5.2
  crypto: ^3.0.7
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2

  wallet: any
  web_socket_channel: ^3.0.3
  protobuf: ^3.1.0
  fixnum: ^1.1.0
  sqflite_common_ffi: ^2.4.0+3
dependency_overrides:
  # record_linux 0.7.2 is incompatible with record_platform_interface 1.5.0
  # (missing startStream, wrong hasPermission signature). Force the latest.
  record_linux: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/logo/
    - assets/mascot/
    - assets/mascot/neural/
    - assets/i18n/
    - assets/sounds/
    - assets/abi/
    - secrets/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/logo/icon.png
  adaptive_icon_foreground: assets/logo/icon.png
  adaptive_icon_background: "#05070B"
  min_sdk_android: 28

flutter_native_splash:
  color: "#05070B"
  android_12:
    color: "#05070B"
  fullscreen: false
